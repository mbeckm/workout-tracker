    <rect x="22" y="154" width="349" height="136" rx="22" class="white line"/>
    <text x="44" y="190" class="tiny slate">MONDAY</text>
    <text x="44" y="220" class="h2 ink">Upper Strength</text>
    <text x="44" y="250" class="meta slate">5 exercises · 18 target sets</text>
    <rect x="242" y="180" width="100" height="30" rx="15" class="volt"/>
    <text x="292" y="201" text-anchor="middle" class="tiny ink">Log set</text>
    <text x="44" y="272" class="meta steel">Bench +2.5 kg last time</text>

    <rect x="22" y="310" width="349" height="116" rx="22" class="white line"/>
    <text x="44" y="346" class="tiny slate">WEDNESDAY</text>
    <text x="44" y="376" class="h2 ink">Lower Strength</text>
    <text x="44" y="406" class="meta slate">4 exercises · 16 target sets</text>
    <rect x="280" y="342" width="62" height="28" rx="14" class="mist"/>
    <text x="311" y="361" text-anchor="middle" class="tiny ink">Edit</text>

    <text x="22" y="480" class="tiny slate">RECENT PROGRESS</text>
    <rect x="22" y="506" width="166" height="92" rx="16" class="white line"/>
    <text x="42" y="536" class="meta slate">Bench Press</text>
    <text x="42" y="570" class="num ink">82.5 kg</text>
    <text x="42" y="590" class="tiny steel">new best</text>
    <rect x="205" y="506" width="166" height="92" rx="16" class="white line"/>
    <text x="225" y="536" class="meta slate">Total volume</text>
    <text x="225" y="570" class="num ink">7.8k</text>
    <text x="225" y="590" class="tiny steel">up 9%</text>

    <rect x="22" y="690" width="349" height="56" rx="16" class="ink"/>
    <text x="196" y="726" text-anchor="middle" class="button paper">Create plan</text>
    <rect x="22" y="766" width="349" height="52" rx="24" class="white line"/>
    <text x="66" y="798" text-anchor="middle" class="tiny ink">Plans</text>
    <text x="148" y="798" text-anchor="middle" class="tiny slate">Log</text>
    <text x="230" y="798" text-anchor="middle" class="tiny slate">Progress</text>
    <text x="312" y="798" text-anchor="middle" class="tiny slate">Me</text>
    <rect x="130" y="834" width="133" height="5" rx="3" class="ink" opacity="0.8"/>
  </g>

  <g transform="translate(1580 52)" class="phone-shadow">
    <rect class="paper" width="393" height="852" rx="36" stroke="#c8ced0"/>
    <rect x="154" y="11" width="85" height="25" rx="13" class="ink"/>
    <text x="26" y="34" class="meta ink">9:41</text>
    <text x="24" y="82" class="meta slate">Plans</text>
    <text x="24" y="122" class="h1 ink">Plan builder</text>
    <rect x="272" y="86" width="90" height="36" rx="18" class="volt"/>
