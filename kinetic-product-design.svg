    <rect x="282" y="636" width="60" height="28" rx="14" class="volt"/>
    <text x="312" y="655" text-anchor="middle" class="tiny ink">New</text>
    <rect x="22" y="696" width="349" height="64" rx="16" class="white line"/>
    <text x="44" y="724" class="h3 ink">Pull-ups</text>
