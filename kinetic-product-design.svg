    <polyline points="48,500 92,484 136,492 180,462 224,450 268,432 322,414" fill="none" stroke="#101316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="322" cy="414" r="7" class="volt"/>
