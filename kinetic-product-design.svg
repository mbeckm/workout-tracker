    <text x="24" y="124" class="h1 ink">Getting stronger</text>

    <rect x="22" y="154" width="349" height="160" rx="22" class="ink"/>
    <text x="44" y="190" class="tiny volt">BENCH PRESS</text>
    <text x="44" y="236" class="title paper">+2.5 kg</text>
    <text x="44" y="266" class="body" fill="#d8dfdf">New best compared with last week.</text>
    <rect x="262" y="198" width="66" height="66" rx="22" class="volt"/>
    <text x="295" y="238" text-anchor="middle" class="h2 ink">PR</text>

    <text x="22" y="366" class="tiny slate">STRENGTH TREND</text>
