    <text x="44" y="184" class="tiny slate">PLAN NAME</text>
    <text x="44" y="210" class="h3 ink">Upper Strength</text>

    <rect x="22" y="256" width="349" height="168" rx="18" class="white line"/>
    <rect x="38" y="280" width="4" height="120" rx="2" class="mist"/>
