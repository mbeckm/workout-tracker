    <text x="181" y="366" text-anchor="middle" class="tiny ink">last 5</text>
    <rect x="230" y="344" width="102" height="34" rx="12" class="volt"/>
    <text x="281" y="366" text-anchor="middle" class="tiny ink">recent best</text>
    <text x="58" y="400" class="meta steel">Use last values as defaults</text>

    <rect x="22" y="444" width="349" height="116" rx="18" class="white line"/>
    <rect x="38" y="468" width="4" height="68" rx="2" class="mist"/>
    <text x="58" y="480" class="h3 ink">Pull-ups</text>
    <text x="58" y="506" class="meta slate">4 sets · target 8 reps</text>
    <rect x="270" y="478" width="62" height="30" rx="15" class="mist"/>
    <text x="301" y="498" text-anchor="middle" class="tiny ink">Edit</text>

    <rect x="22" y="586" width="349" height="52" rx="16" class="white line"/>
    <text x="54" y="619" class="h3 ink">Add exercise</text>
    <text x="328" y="619" text-anchor="middle" class="h3 slate">+</text>

    <text x="22" y="692" class="tiny slate">REORDER MODE</text>
    <text x="22" y="720" class="body slate">Large handles, no hidden gestures, sticky save.</text>
    <rect x="22" y="758" width="349" height="56" rx="16" class="ink"/>
    <text x="196" y="794" text-anchor="middle" class="button paper">Save plan</text>
    <rect x="130" y="834" width="133" height="5" rx="3" class="ink" opacity="0.8"/>
  </g>

