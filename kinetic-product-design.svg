<svg xmlns="http://www.w3.org/2000/svg" width="2360" height="1120" viewBox="0 0 2360 1120">
  <defs>
    <style>
      .bg { fill: #eef2f3; }
      .ink { fill: #101316; }
      .graphite { fill: #1c2228; }
      .paper { fill: #f8faf7; }
      .white { fill: #ffffff; }
      .mist { fill: #eef2f3; }
      .line { stroke: #dce2e3; stroke-width: 1; }
      .slate { fill: #68717a; }
      .muted { fill: #aab3b5; }
      .volt { fill: #c7f464; }
      .ember { fill: #ff7a45; }
      .steel { fill: #7aa7b7; }
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; letter-spacing: 0; }
      .h1 { font: 700 31px -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; letter-spacing: 0; }
      .h2 { font: 700 22px -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; letter-spacing: 0; }
      .h3 { font: 700 16px -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; letter-spacing: 0; }
      .body { font: 400 15px -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; letter-spacing: 0; }
      .meta { font: 600 12px -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; letter-spacing: 0; }
      .tiny { font: 700 11px -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; letter-spacing: 0; }
      .button { font: 700 15px -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; letter-spacing: 0; }
      .num { font: 700 28px -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; letter-spacing: 0; }
      .phone-shadow { filter: drop-shadow(0 22px 42px rgba(16, 19, 22, 0.16)); }
      .board-shadow { filter: drop-shadow(0 18px 32px rgba(16, 19, 22, 0.12)); }
    </style>
  </defs>

  <rect class="bg" width="2360" height="1120"/>

  <g transform="translate(48 52)" class="board-shadow">
    <rect class="ink" width="500" height="970" rx="22"/>
    <text x="36" y="68" class="title paper">Kinetic v2</text>
    <text x="38" y="112" class="body" fill="#d8dfdf">Mobbin-informed workout planning and set logging.</text>
    <rect x="38" y="150" width="106" height="30" rx="15" class="volt"/>
    <text x="91" y="170" text-anchor="middle" class="meta ink">Light-first</text>
    <rect x="156" y="150" width="116" height="30" rx="15" fill="#e4eced"/>
    <text x="214" y="170" text-anchor="middle" class="meta ink">One-handed</text>
    <rect x="284" y="150" width="118" height="30" rx="15" fill="#e4eced"/>
    <text x="343" y="170" text-anchor="middle" class="meta ink">Strength-led</text>

    <text x="38" y="238" class="tiny volt">MOBBIN SIGNAL</text>
    <g transform="translate(38 268)">
      <rect width="424" height="76" rx="14" fill="#1f282d" stroke="#334047"/>
      <text x="20" y="32" class="h3 paper">Hevy</text>
      <text x="112" y="28" class="body" fill="#c7d0d0">Use compact exercise blocks and</text>
      <text x="112" y="50" class="body" fill="#c7d0d0">set tables, but soften the density.</text>
    </g>
    <g transform="translate(38 364)">
      <rect width="424" height="76" rx="14" fill="#1f282d" stroke="#334047"/>
      <text x="20" y="32" class="h3 paper">Fitbod</text>
      <text x="112" y="28" class="body" fill="#c7d0d0">Put records beside the set and</text>
      <text x="112" y="50" class="body" fill="#c7d0d0">lead progress with one trend.</text>
    </g>
    <g transform="translate(38 460)">
      <rect width="424" height="76" rx="14" fill="#1f282d" stroke="#334047"/>
      <text x="20" y="32" class="h3 paper">Ladder</text>
      <text x="112" y="28" class="body" fill="#c7d0d0">Saved plans should feel friendly,</text>
      <text x="112" y="50" class="body" fill="#c7d0d0">approachable, and reusable.</text>
    </g>
    <g transform="translate(38 556)">
      <rect width="424" height="76" rx="14" fill="#1f282d" stroke="#334047"/>
      <text x="20" y="32" class="h3 paper">Strava</text>
      <text x="112" y="28" class="body" fill="#c7d0d0">Reward effort with concise stats,</text>
      <text x="112" y="50" class="body" fill="#c7d0d0">without becoming social-first.</text>
    </g>

    <text x="38" y="720" class="tiny volt">PRODUCT LOOP</text>
    <text x="38" y="756" class="body paper">Plans are the home base.</text>
    <text x="38" y="784" class="body paper">Logging is table logic plus a thumb-first row.</text>
    <text x="38" y="812" class="body paper">Progress answers: am I getting stronger?</text>
    <text x="38" y="840" class="body paper">Delight stays small: save pulse, PR badge,</text>
    <text x="38" y="868" class="body paper">and clear progress deltas.</text>
  </g>

  <g transform="translate(590 52)" class="board-shadow">
    <rect class="paper" width="500" height="970" rx="22"/>
    <text x="36" y="68" class="h1 ink">Design philosophy</text>
    <text x="36" y="106" class="body slate">A calm strength tool, not a content feed.</text>
    <text x="36" y="166" class="tiny slate">CORE RULES</text>
    <g transform="translate(36 196)">
      <rect width="428" height="90" rx="16" class="white line"/>
      <text x="20" y="34" class="h3 ink">Plan cards are friendly</text>
      <text x="20" y="60" class="body slate">Day label, exercises, last win, and quick edit.</text>
    </g>
    <g transform="translate(36 306)">
      <rect width="428" height="90" rx="16" class="white line"/>
      <text x="20" y="34" class="h3 ink">Set tables are compact</text>
      <text x="20" y="60" class="body slate">Previous values stay visible, current row gets focus.</text>
    </g>
    <g transform="translate(36 416)">
      <rect width="428" height="90" rx="16" class="white line"/>
      <text x="20" y="34" class="h3 ink">Inputs live near the thumb</text>
      <text x="20" y="60" class="body slate">Large reps and weight controls, plus fast correction.</text>
    </g>
    <g transform="translate(36 526)">
      <rect width="428" height="90" rx="16" class="white line"/>
      <text x="20" y="34" class="h3 ink">Progress is a sentence</text>
      <text x="20" y="60" class="body slate">"You added 2.5 kg" beats generic dashboards.</text>
    </g>
    <text x="36" y="688" class="tiny slate">PALETTE USE</text>
    <rect x="36" y="722" width="92" height="54" rx="12" fill="#101316"/>
    <text x="36" y="804" class="meta ink">Ink</text>
    <rect x="146" y="722" width="92" height="54" rx="12" fill="#f8faf7" stroke="#dce2e3"/>
    <text x="146" y="804" class="meta ink">Paper</text>
    <rect x="256" y="722" width="92" height="54" rx="12" fill="#c7f464"/>
    <text x="256" y="804" class="meta ink">Volt</text>
    <rect x="366" y="722" width="92" height="54" rx="12" fill="#7aa7b7"/>
    <text x="366" y="804" class="meta ink">Steel</text>
    <text x="36" y="884" class="body slate">Volt is reserved for save actions, PR moments,</text>
    <text x="36" y="908" class="body slate">and progress deltas so it keeps its punch.</text>
  </g>

  <g transform="translate(1140 52)" class="phone-shadow">
    <rect class="paper" width="393" height="852" rx="36" stroke="#c8ced0"/>
    <rect x="154" y="11" width="85" height="25" rx="13" class="ink"/>
    <text x="26" y="34" class="meta ink">9:41</text>
    <rect x="304" y="22" width="17" height="8" rx="2" class="ink"/>
    <rect x="327" y="22" width="15" height="8" rx="4" class="ink"/>
    <rect x="350" y="19" width="24" height="12" rx="3" class="ink"/>
