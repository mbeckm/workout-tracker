    <text x="48" y="238" class="h3 ink">1</text>
    <text x="126" y="238" class="body ink">80 kg</text>
    <text x="222" y="238" class="body ink">5</text>
    <rect x="292" y="218" width="50" height="28" rx="14" class="mist"/>
    <text x="317" y="237" text-anchor="middle" class="tiny ink">Done</text>
    <text x="48" y="290" class="h3 ink">2</text>
    <text x="126" y="290" class="body ink">80 kg</text>
    <text x="222" y="290" class="body ink">5</text>
    <rect x="292" y="270" width="50" height="28" rx="14" class="mist"/>
    <text x="317" y="289" text-anchor="middle" class="tiny ink">Done</text>
    <rect x="34" y="316" width="325" height="58" rx="16" fill="#f1f8d5" stroke="#c7f464"/>
    <text x="48" y="352" class="h3 ink">3</text>
    <text x="126" y="352" class="body ink">82.5 kg</text>
    <text x="222" y="352" class="body ink">5</text>
    <rect x="292" y="332" width="50" height="28" rx="14" class="volt"/>
    <text x="317" y="351" text-anchor="middle" class="tiny ink">Now</text>

    <text x="22" y="452" class="tiny slate">CURRENT SET</text>
    <rect x="22" y="480" width="166" height="112" rx="18" class="white line"/>
    <text x="42" y="514" class="meta slate">Weight</text>
    <text x="42" y="556" class="num ink">82.5</text>
    <text x="126" y="556" class="meta slate">kg</text>
    <rect x="205" y="480" width="166" height="112" rx="18" class="white line"/>
    <text x="225" y="514" class="meta slate">Reps</text>
    <text x="225" y="556" class="num ink">5</text>
    <rect x="42" y="616" width="56" height="40" rx="14" class="mist"/>
    <text x="70" y="642" text-anchor="middle" class="h3 ink">-</text>
    <rect x="112" y="616" width="56" height="40" rx="14" class="ink"/>
    <text x="140" y="642" text-anchor="middle" class="h3 paper">+</text>
    <rect x="225" y="616" width="56" height="40" rx="14" class="mist"/>
    <text x="253" y="642" text-anchor="middle" class="h3 ink">-</text>
    <rect x="295" y="616" width="56" height="40" rx="14" class="ink"/>
    <text x="323" y="642" text-anchor="middle" class="h3 paper">+</text>
    <rect x="22" y="690" width="349" height="56" rx="16" class="volt"/>
    <text x="196" y="726" text-anchor="middle" class="button ink">Save set</text>
    <text x="196" y="778" text-anchor="middle" class="meta steel">Last time: 80 kg x 5 · best: 82.5 kg x 5</text>
    <rect x="130" y="834" width="133" height="5" rx="3" class="ink" opacity="0.8"/>
